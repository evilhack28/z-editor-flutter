name: Build release (Windows, Linux, Android)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: stable

jobs:
  build-windows:
    name: Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Pub
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_VERSION }}
          cache: true

      - run: flutter pub get
      - run: flutter build windows --release

      # upload-artifact strips the path root you upload; use artifact/z_editor so the
      # downloaded zip has z_editor/ at the top, not loose exe/dll/data.
      - name: Stage Windows bundle for artifact
        shell: pwsh
        run: |
          $dest = "artifact/z_editor"
          New-Item -ItemType Directory -Path $dest -Force | Out-Null
          Get-ChildItem -Path "build/windows/x64/runner/Release" -Force | Move-Item -Destination $dest

      - uses: actions/upload-artifact@v4
        with:
          name: z-editor-windows-x64
          path: artifact
          if-no-files-found: error

  build-linux:
    name: Linux x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev \
            libstdc++-14-dev
          sudo ln -sf /usr/lib/x86_64-linux-gnu/libstdc++.so.6 \
            /usr/lib/x86_64-linux-gnu/libstdc++.so

      - name: Cache Pub
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_VERSION }}
          cache: true

      - run: flutter pub get
      - run: flutter build linux --release

      - name: Stage Linux bundle for artifact
        run: |
          mkdir -p artifact/z_editor
          shopt -s dotglob
          mv build/linux/x64/release/bundle/* artifact/z_editor/

      - uses: actions/upload-artifact@v4
        with:
          name: z-editor-linux-x64
          path: artifact
          if-no-files-found: error

  build-android:
    name: Android APK (signed)
    runs-on: ubuntu-latest
    # Release keystore secrets are not available to workflows triggered from fork PRs.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Pub
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Decode release keystore
        env:
          KEYSTORE: ${{ secrets.KEYSTORE }}
        run: |
          if [ -z "$KEYSTORE" ]; then
            echo "Missing repository secret KEYSTORE (base64-encoded keystore)."
            exit 1
          fi
          echo "$KEYSTORE" | base64 -d > android/app/release-keystore.jks

      - run: flutter pub get

      - name: Build signed release APK
        env:
          # Path is relative to the android/ Gradle root (rootProject.file), not the repo root.
          ANDROID_KEYSTORE_FILE: app/release-keystore.jks
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: flutter build apk --release

      - name: Stage APK artifact
        run: |
          mkdir -p artifacts
          cp build/app/outputs/flutter-apk/app-release.apk artifacts/z-editor-release.apk

      - uses: actions/upload-artifact@v4
        with:
          name: z-editor-android-apk
          path: artifacts/z-editor-release.apk
          if-no-files-found: error
